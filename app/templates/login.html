{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
  <div class="card reveal" style="max-width:540px; margin:28px auto 0; padding:26px;">
    <h2 style="margin:0; font-size:30px;">Вход в аккаунт</h2>
    <p class="muted" style="margin-top:10px;">Продолжите работу с тестами, бланками и статистикой в новом интерфейсе.</p>
    <form method="post" style="margin-top:14px;">
      <label>Логин</label>
      <input name="login" type="text" required />

      <label>Пароль</label>
      <input name="password" type="password" required />

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" type="submit">Войти</button>
        <a class="btn secondary" href="{{ url_for('web.register') }}">Регистрация</a>
      </div>
    </form>
  </div>
{% endblock %}
