{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
  <div class="card reveal" style="max-width:560px; margin:28px auto 0; padding:26px;">
    <h2 style="margin:0; font-size:30px;">Регистрация</h2>
    <p class="muted" style="margin-top:10px;">Создайте профиль и начните запускать тестирование в современном кабинете.</p>
    <form method="post" style="margin-top:14px;">
      <label>Логин</label>
      <input name="login" type="text" required />

      <label>Пароль</label>
      <div style="position:relative;">
        <input id="password" name="password" type="password" required style="padding-right:42px;" />
        <button
          type="button"
          data-toggle-password="password"
          aria-label="Показать пароль"
          title="Показать пароль"
          style="position:absolute; right:10px; top:50%; transform:translateY(-50%); border:0; background:transparent; padding:0; width:20px; height:20px; cursor:pointer; color:#64748b;"
        >
          <svg data-eye-open viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg data-eye-closed viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none;">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94"></path>
            <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.77 21.77 0 0 1-3.32 4.31"></path>
            <path d="M1 1l22 22"></path>
          </svg>
        </button>
      </div>

      <label>Повтор пароля</label>
      <div style="position:relative;">
        <input id="password2" name="password2" type="password" required style="padding-right:42px;" />
        <button
          type="button"
          data-toggle-password="password2"
          aria-label="Показать пароль"
          title="Показать пароль"
          style="position:absolute; right:10px; top:50%; transform:translateY(-50%); border:0; background:transparent; padding:0; width:20px; height:20px; cursor:pointer; color:#64748b;"
        >
          <svg data-eye-open viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg data-eye-closed viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none;">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94"></path>
            <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.77 21.77 0 0 1-3.32 4.31"></path>
            <path d="M1 1l22 22"></path>
          </svg>
        </button>
      </div>

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" type="submit">Создать аккаунт</button>
        <a class="btn secondary" href="{{ url_for('web.login') }}">Назад</a>
      </div>
    </form>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var buttons = document.querySelectorAll("[data-toggle-password]");
      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          var inputId = btn.getAttribute("data-toggle-password");
          var input = document.getElementById(inputId);
          if (!input) return;
          var isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          var eyeOpen = btn.querySelector("[data-eye-open]");
          var eyeClosed = btn.querySelector("[data-eye-closed]");
          if (eyeOpen && eyeClosed) {
            eyeOpen.style.display = isHidden ? "none" : "";
            eyeClosed.style.display = isHidden ? "" : "none";
          }
          var actionText = isHidden ? "Скрыть пароль" : "Показать пароль";
          btn.setAttribute("aria-label", actionText);
          btn.setAttribute("title", actionText);
        });
      });
    });
  </script>
{% endblock %}
